services:
  - type: web
    name: idr-exchange-rates
    runtime: node
    repo: https://github.com/k-ardliyan/idr-exchange-rates
    plan: free
    envVars:
      - key: BUN_VERSION
        value: latest
    region: singapore
    buildCommand: bun install && bun run build
    startCommand: bun run start
version: "1"
